<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnly</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#5b4ee8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Turnly" />
    <meta name="mobile-web-app-capable" content="yes" />
    <script>
      // Apply the saved/system theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('turnly-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          if (t === 'dark') document.documentElement.classList.add('dark')
          // Apply the cached gacha theme palette (if any) before paint, same as dark mode.
          var p = localStorage.getItem('turnly-palette')
          if (p) document.documentElement.setAttribute('data-palette', p)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
